apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
spec:
  type: NodePort
  selector:
    app: qbittorrent
  ports:
    - name: webui
      port: 8080
      targetPort: 8080
      nodePort: 30000
      protocol: TCP
    - name: bittorrent-tcp
      port: 6881
      targetPort: 6881
      nodePort: 30681
      protocol: TCP
    - name: bittorrent-udp
      port: 6881
      targetPort: 6881
      nodePort: 30682
      protocol: UDP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qbittorrent
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: config-init
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              echo "Injecting qBittorrent config..."
              cp /tmp/qbittorrent.conf /config/qBittorrent/qBittorrent.conf
              chown 1000:1000 /config/qBittorrent/qBittorrent.conf
              chmod 644 /config/qBittorrent/qBittorrent.conf
              echo "Config injected successfully"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: qbittorrent-config
              mountPath: /tmp
      containers:
        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:latest
          imagePullPolicy: Always
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "700m"
          ports:
            - containerPort: 8080
            - containerPort: 6881
              protocol: TCP
            - containerPort: 6881
              protocol: UDP
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Europe/Warsaw"
            - name: WEBUI_PORT
              value: "8080"
            - name: TORRENTING_PORT
              value: "6881"
            - name: UMASK
              value: "002"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: qbittorrent-config-pvc
        - name: downloads
          persistentVolumeClaim:
            claimName: qbittorrent-downloads-pvc
        - name: qbittorrent-config
          configMap:
            name: qbittorrent-config
            defaultMode: 0644
            items:
              - key: qbittorrent.conf
                path: qbittorrent.conf
